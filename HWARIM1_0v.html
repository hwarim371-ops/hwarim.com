<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWARIM | Premium Board (Preview)</title>
    
    <!-- 최고급 웹 폰트 (Pretendard) 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    
    <style>
        /* 글로벌 럭셔리 디자인 시스템 */
        :root {
            --bg-body: #F4F4F6;          
            --bg-card: #FFFFFF;          
            --bg-glass: rgba(255, 255, 255, 0.9); 
            
            --text-primary: #1A1A1B;     
            --text-secondary: #6B6B70;   
            --text-tertiary: #A1A1AA;
            
            --accent-gold: #C6A87C;      
            --accent-gold-hover: #B09265;
            --accent-dark: #27272A;      
            
            --border-light: rgba(0, 0, 0, 0.05);
            --border-gold: rgba(198, 168, 124, 0.3);
            
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.05);
            
            --font-main: 'Pretendard Variable', Pretendard, sans-serif;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * { box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 뼈대 레이아웃 */
        .app-container {
            display: flex; width: 100%; max-width: 1400px; margin: 0 auto; min-height: 100vh;
        }
        .sidebar {
            width: 260px; background: var(--bg-card); border-right: 1px solid var(--border-light);
            padding: 40px 24px; display: flex; flex-direction: column;
        }
        .brand {
            font-size: 22px; font-weight: 800; letter-spacing: 0.05em;
            color: var(--accent-dark); margin-bottom: 40px; display: flex; align-items: center; gap: 10px;
        }
        .brand::before {
            content: ''; display: block; width: 10px; height: 10px; background: var(--accent-gold); border-radius: 50%;
        }
        .main-content {
            flex-grow: 1; padding: 50px 60px; max-width: 1000px;
        }

        /* 버튼 및 폼 럭셔리 오버라이드 흉내 */
        button, .btn {
            font-family: var(--font-main);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-accent {
            background-color: var(--accent-gold); color: #fff;
            box-shadow: 0 4px 12px rgba(198, 168, 124, 0.3);
        }
        .btn-accent:hover {
            background-color: var(--accent-gold-hover); transform: translateY(-2px);
        }
        .btn-outline {
            background-color: transparent; color: var(--text-secondary); border: 1px solid var(--border-light);
        }
        .btn-outline:hover {
            border-color: var(--accent-gold); color: var(--accent-gold);
        }

        /* 게시글 카드 디자인 */
        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all 0.4s ease;
        }
        .post-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--border-gold);
        }
        
        /* 사용자 프로필 아바타 (기존 JS 연동) */
        .avatar {
            width: 56px; height: 56px; border-radius: 14px; color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 사이드바 (미리보기용) -->
        <aside class="sidebar">
            <div class="brand">HWARIM</div>
            <div style="display:flex; flex-direction:column; gap:16px;">
                <div style="padding:12px 16px; background:var(--bg-body); border-radius:var(--radius-sm); font-weight:600; border-left:3px solid var(--accent-gold);">전체 라운지</div>
                <div style="padding:12px 16px; color:var(--text-secondary); font-weight:500;">공지사항</div>
                <div style="padding:12px 16px; color:var(--text-secondary); font-weight:500;">부서 갤러리</div>
                <div style="padding:12px 16px; color:var(--text-secondary); font-weight:500;">내 정보 설정</div>
            </div>
        </aside>

        <!-- 메인 컨텐츠 영역 (미리보기용 가짜 데이터) -->
        <main class="main-content">
            <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 40px;">
                <h1 style="font-size:28px; font-weight:700;">사내 라운지</h1>
                <button class="btn btn-accent">새 글 쓰기</button>
            </header>
            
            <div id="boardContainer">
                
                <!-- 샘플 게시글 1 (공지사항 느낌) -->
                <div class="post-card" style="border-top: 4px solid var(--accent-gold);">
                    <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                        <div class="avatar" style="background:#1A2B4C;">화</div>
                        <div>
                            <h2 style="margin:0 0 4px 0; font-size:18px; font-weight:700;">화림 관리자 <span style="font-size:11px; background:var(--accent-gold); color:white; padding:2px 6px; border-radius:4px; margin-left:6px; vertical-align:middle;">공지</span></h2>
                            <p style="margin:0; font-size:13px; color:var(--text-secondary);">2024.05.15 · 경영지원팀</p>
                        </div>
                    </div>
                    <div style="font-size:15px; color:var(--text-primary); line-height:1.7; margin-bottom:20px;">
                        임직원 여러분 안녕하십니까. 경영지원팀입니다.<br>
                        기존의 딱딱했던 시스템을 벗어나, 하이엔드 테마가 적용된 새로운 화림 게시판 2.0의 런칭을 안내해 드립니다.<br>
                        기존의 투표 기능, 드라이브 연동은 100% 동일하게 작동합니다.
                    </div>
                    <div style="display:flex; gap:12px; border-top:1px solid var(--border-light); padding-top:16px;">
                        <button class="btn btn-outline" style="padding:8px 16px; font-size:13px;">좋아요 (12)</button>
                        <button class="btn btn-outline" style="padding:8px 16px; font-size:13px;">댓글 달기</button>
                    </div>
                </div>

                <!-- 샘플 게시글 2 (일반 투표/의견 느낌) -->
                <div class="post-card">
                    <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                        <div class="avatar" style="background:#CFA968;">김</div>
                        <div>
                            <h2 style="margin:0 0 4px 0; font-size:18px; font-weight:700;">김디자인</h2>
                            <p style="margin:0; font-size:13px; color:var(--text-secondary);">2024.05.14 · 디자인팀</p>
                        </div>
                    </div>
                    <div style="font-size:15px; color:var(--text-primary); line-height:1.7; margin-bottom:20px;">
                        새로운 패키지 디자인 A안과 B안 중 어떤 게 더 나은지 투표 부탁드립니다!<br>
                        <br>
                        <div style="background:var(--bg-body); padding:16px; border-radius:var(--radius-sm); border:1px solid var(--border-light);">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                                <strong>A안 (모던 스타일)</strong> <span style="color:var(--accent-gold); font-weight:bold;">65%</span>
                            </div>
                            <div style="width:100%; height:8px; background:#e0e0e0; border-radius:4px; overflow:hidden;"><div style="width:65%; height:100%; background:var(--accent-gold);"></div></div>
                        </div>
                    </div>
                    <div style="display:flex; gap:12px; border-top:1px solid var(--border-light); padding-top:16px;">
                        <button class="btn btn-outline" style="padding:8px 16px; font-size:13px;">투표 참여하기</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
